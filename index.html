<!doctype html>
<html lang="es">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #003366;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .contenedor {
      display: flex;
    }

    aside {
      width: 200px;
      background-color: #f2f2f2;
      padding: 20px;
    }

    aside ul {
      list-style-type: none;
      padding: 0;
    }

    aside li {
      margin-bottom: 10px;
    }

    aside li.activo {
      font-weight: bold;
    }

    main {
      flex-grow: 1;
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    table,
    th,
    td {
      border: 1px solid black;
    }

    th,
    td {
      padding: 10px;
      text-align: left;
    }
  </style>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sistema de Calificaciones</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <h1>Universidad Tecnológica Nacional</h1>
      <h1>Facultad Regional Tucuman</h1>
      <p>Sistema Académico</p>
    </header>

    <div class="contenedor">
      <!-- Menú -->

      <aside>
        <h2>Menú</h2>

        <ul>
          <li>Inicio</li>

          <li>Estudiantes</li>

          <li>Materias</li>

          <li class="activo">Calificaciones</li>
        </ul>
      </aside>

      <!-- Contenido -->

      <main>
        <h2>Gestión de Calificaciones</h2>

        <div class="formulario">
          <select id="alumno"></select>

          <select id="materia"></select>

          <input type="number" id="nota" placeholder="Nota" />

          <input type="date" id="fecha" />

          <button onclick="agregarCalificacion()">Guardar</button>
        </div>

        <h2>Listado de Calificaciones</h2>

        <table>
          <thead>
            <tr>
              <th>Alumno</th>

              <th>Materia</th>

              <th>Nota</th>

              <th>Estado</th>

              <th>Fecha</th>

              <th>Acciones</th>
            </tr>
          </thead>

          <tbody id="tablaCalificaciones"></tbody>
        </table>
      </main>
    </div>

    <script></script>
  </body>
</html>
